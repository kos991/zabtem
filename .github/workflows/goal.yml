name: goal

on:
  workflow_dispatch:
    inputs:
      goal:
        description: Goal to run
        required: true
        default: full
        type: choice
        options:
          - verify
          - generate-template
          - build
          - full

jobs:
  verify:
    if: ${{ inputs.goal == 'verify' || inputs.goal == 'full' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

  generate-template:
    if: ${{ inputs.goal == 'generate-template' || inputs.goal == 'full' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm generate:template
      - run: pnpm validate:template
      - uses: actions/upload-artifact@v4
        with:
          name: sample-zabbix-template
          path: dist/templates/sample-template.yaml
          if-no-files-found: error

  build:
    if: ${{ inputs.goal == 'build' || inputs.goal == 'full' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows-x86_64
          - os: ubuntu-latest
            target: linux-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.target }}-skeleton
          path: dist/desktop/*
          if-no-files-found: error

  arm64-experimental:
    if: ${{ false }}
    continue-on-error: true
    runs-on: ubuntu-24.04-arm
    steps:
      - run: echo "ARM64 is reserved for manual experimental validation after x86_64 skeleton build is stable."
