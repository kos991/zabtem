zabbix_export:
  version: '7.0'
  template_groups:
    - name: Templates/Network devices
  templates:
    - template: Template SNMP Fixture Switch Physical CN
      name: Template SNMP Fixture Switch Physical CN
      groups:
        - name: Templates/Network devices
      items:
        - name: System description
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.1.1.0
          key: snmp.system.description
          value_type: TEXT
        - name: Interface oper status 1
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.2.2.1.8.1
          key: snmp.interface.oper_status.1
          value_type: UNSIGNED
